<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede de Saúde Mental - Teresópolis</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        :root {
            --sidebar-width: 350px;
            --primary: #2c7da0;
            --primary-dark: #1a5a74;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.12);
            --radius: 14px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #e9edf2;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition);
            position: relative;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(145deg, #2c7da0 0%, #1e5b75 100%);
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header h1 .icon {
            font-size: 1.6rem;
        }
        .sidebar-header .subtitle {
            font-size: 0.78rem;
            opacity: 0.9;
            margin-top: 6px;
            font-weight: 400;
            line-height: 1.4;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-list::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .point-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition);
            border: 1.5px solid transparent;
            background: #f8fafc;
            position: relative;
        }
        .point-card:hover {
            background: #e6f2f7;
            border-color: #b6d8e8;
            transform: translateX(3px);
            box-shadow: 0 2px 8px rgba(44, 125, 160, 0.1);
        }
        .point-card.active {
            background: #e1f0f8;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.15);
            transform: translateX(3px);
        }
        .point-card .marker-num {
            width: 34px;
            height: 34px;
            min-width: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        .point-card .info {
            flex: 1;
            min-width: 0;
        }
        .point-card .info .title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .point-card .info .address {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .point-card .arrow-icon {
            align-self: center;
            color: #94a3b8;
            font-size: 1.2rem;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .point-card:hover .arrow-icon {
            transform: translateX(3px);
            color: var(--primary);
        }

        /* ========== MAP CONTAINER ========== */
        .map-container {
            flex: 1;
            height: 100vh;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ========== POPUP CUSTOMIZADO ========== */
        .leaflet-popup-content-wrapper {
            border-radius: 14px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2) !important;
            padding: 0 !important;
            overflow: hidden;
            border: none !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            min-width: 280px;
            max-width: 360px !important;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .leaflet-popup-close-button {
            top: 12px !important;
            right: 14px !important;
            font-size: 20px !important;
            color: #fff !important;
            z-index: 10;
            width: 28px !important;
            height: 28px !important;
            background: rgba(0, 0, 0, 0.35) !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            line-height: 1 !important;
            transition: background 0.2s;
        }
        .leaflet-popup-close-button:hover {
            background: rgba(0, 0, 0, 0.55) !important;
            color: #fff !important;
        }

        .popup-header {
            padding: 18px 20px 14px 20px;
            color: #fff;
            position: relative;
        }
        .popup-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            padding-right: 20px;
            line-height: 1.3;
        }
        .popup-header .popup-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 500;
        }
        .popup-body {
            padding: 16px 20px 18px 20px;
            background: #fff;
            color: var(--text);
            font-size: 0.88rem;
            line-height: 1.6;
        }
        .popup-body p {
            margin: 0 0 10px 0;
        }
        .popup-body .info-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.82rem;
            color: var(--text-light);
        }
        .popup-body .info-line a {
            color: #1e5b75;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }
        .popup-body .info-line .emoji {
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .leaflet-popup-tip {
            box-shadow: none !important;
        }

        /* ========== BOTÃO MOBILE ========== */
        .mobile-toggle {
            display: none;
            position: absolute;
            top: 90px;
            left: 5px;
            z-index: 1100;
            background: #fff;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2);
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .mobile-toggle:hover {
            background: #f1f5f9;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.25);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            transition: opacity var(--transition);
        }

        /* ========== RESPONSIVO ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 1050;
                transform: translateX(-100%);
                width: 300px;
                min-width: 300px;
                border-radius: 0 16px 16px 0;
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.25);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.show {
                display: block;
                opacity: 1;
            }
            .mobile-toggle {
                display: flex;
            }
            .map-container {
                width: 100%;
            }
            .leaflet-popup-content {
                min-width: 240px;
                max-width: 290px !important;
            }
        }

        /* Ajuste para celular em modo paisagem (menu mais compacto) */
        @media (max-width: 900px) and (orientation: landscape) {
            .sidebar {
                width: 260px;
                min-width: 260px;
            }
            .sidebar-header h1 {
                font-size: 1.1rem;
            }
            .sidebar-header .subtitle {
                font-size: 0.7rem;
            }
            .point-card {
                padding: 10px 12px;
                gap: 8px;
            }
            .point-card .marker-num {
                width: 28px;
                height: 28px;
                min-width: 28px;
                font-size: 0.75rem;
            }
            .point-card .info .title {
                font-size: 0.8rem;
            }
            .point-card .info .address {
                font-size: 0.65rem;
            }
        }

        @media (max-width: 400px) {
            .sidebar {
                width: 85vw;
                min-width: 85vw;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button class="mobile-toggle" id="mobileToggle" title="Abrir lista de locais">
        ☰
    </button>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>
                <span class="icon">🧠</span> Saúde Mental
            </h1>
            <p class="subtitle">Rede de atendimento psicológico em Teresópolis · RJ</p>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </aside>

    <!-- ==================== MAPA ==================== -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <script>
        (function() {
            // =============================================
            // 🧭 PONTOS DE ATENDIMENTO EM TERESÓPOLIS
            // =============================================
            const pontosDeInteresse = [{
                lat: -22.4078,
                lng: -42.9715,
                title: "Serviço Escola de Psicologia da Universidade Estácio de Sá",
                address: "R. Nilza Chiapeta Fadigas, 488 - Várzea, Teresópolis - RJ, 25963-150",
                phone: "(21) 97300-2020",
                whatsapp: true,
                email: null,
                color: "#2c7da0",
                icon: "🎓",
                type: "Serviço-Escola",
                description: "Atendimento psicológico à comunidade realizado por estudantes supervisionados. Oferece avaliação psicológica e psicoterapia breve com valor social.",
                iconUrl: "imgs/estacio.png"
            }, {
                lat: -22.4362,
                lng: -42.9818,
                title: "Centro de Atenção Psicossocial InfantoJuvenil - CAPSI",
                address: "R. Tietê, 845 - Araras, Teresópolis - RJ, 25961-110",
                phone: "(21) 2742-3890",
                whatsapp: false,
                email: null,
                color: "#5f9ea0",
                icon: "🧒",
                type: "CAPS Infantojuvenil",
                description: "Atendimento especializado para crianças e adolescentes com transtornos mentais graves. Equipe multiprofissional com psiquiatria, psicologia, terapia ocupacional e assistência social.",
                iconUrl: "imgs/CAPSI.png"
            }, {
                lat: -22.3936,
                lng: -42.9596,
                title: "Serviço de Psicologia Aplicada do Unifeso - SPA-Unifeso",
                address: "Estr. Venceslau José de Medeiros, 1045 - Prata, Teresópolis - RJ, 25976-345",
                phone: "(21) 2743-5309",
                whatsapp: true,
                email: "servicodepsicologiaaplicada@unifeso.edu.br",
                color: "#6c5b7b",
                icon: "🏥",
                type: "Clínica-Escola",
                description: "Serviço-escola do Unifeso que integra ensino, pesquisa e extensão. Oferece psicoterapia individual, grupal e plantão psicológico para a população.",
                iconUrl: "imgs/unifeso.png"
            }, {
                lat: -22.4184,
                lng: -42.9522,
                title: "Centro de Atenção Psicossocial - CAPS",
                address: "R. Roberto Rosa, 659 - Tijuca, Teresópolis - RJ",
                phone: "(21) 96659-3312",
                whatsapp: false,
                email: null,
                color: "#b56576",
                icon: "🏠",
                type: "CAPS Adulto",
                description: "Serviço de saúde mental para adultos com transtornos severos e persistentes. Desenvolve projetos terapêuticos individuais visando reabilitação psicossocial e autonomia.",
                iconUrl: "imgs/CAPS.png"
            }];

            // =============================================
            // CONFIGURAÇÃO DO MAPA (com zoom limitado)
            // =============================================
            const map = L.map('map', {
                center: [-22.412, -42.965],
                zoom: 14,
                zoomControl: true,
                scrollWheelZoom: true,
                doubleClickZoom: true,
                dragging: true,
                minZoom: 12,   // impede zoom muito afastado
                maxZoom: 17    // impede zoom muito próximo (ajuste conforme necessário)
            });

            // Tile com estilo suave (CartoDB Voyager)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; <a href="https://carto.com/">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20,
                minZoom: 3,
            }).addTo(map);

            // =============================================
            // CRIAÇÃO DOS MARCADORES E POPUPS
            // =============================================
            const marcadores = [];
            const sidebarList = document.getElementById('sidebarList');

            // Ícone numerado (fallback) - sem alterações
            function criarIconeNumerado(cor, numero, isActive = false) {
                const size = isActive ? 38 : 34;
                const borderWidth = isActive ? 4 : 3;
                const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size + 6}" viewBox="0 0 ${size} ${size + 6}">
                  <defs>
                    <filter id="shadow_num_${numero}" x="-30%" y="-10%" width="160%" height="160%">
                      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.35"/>
                    </filter>
                  </defs>
                  <g filter="url(#shadow_num_${numero})">
                    <path d="M${size/2},0 C${size * 0.85},0 ${size},${size * 0.35} ${size},${size * 0.55} C${size},${size * 0.88} ${size/2},${size} ${size/2},${size} C${size/2},${size} 0,${size * 0.88} 0,${size * 0.55} C0,${size * 0.35} ${size * 0.15},0 ${size/2},0 Z"
                      fill="${cor}" stroke="#fff" stroke-width="${borderWidth}"/>
                    <circle cx="${size/2}" cy="${size * 0.42}" r="${size * 0.28}" fill="rgba(255,255,255,0.95)"/>
                    <text x="${size/2}" y="${size * 0.42}" text-anchor="middle" dy=".35em"
                      font-family="'Inter','Segoe UI',system-ui,sans-serif" font-weight="700"
                      font-size="${size * 0.38}" fill="${cor}">${numero}</text>
                  </g>
                </svg>`;
                return L.divIcon({
                    html: svg,
                    className: 'custom-marker-icon',
                    iconSize: [size, size + 6],
                    iconAnchor: [size / 2, size + 4],
                    popupAnchor: [0, -(size + 2)],
                });
            }

            // Função que escolhe o ícone correto (imagem personalizada ou numerado)
            function criarIcone(ponto, index, isActive = false) {
                if (ponto.iconUrl) {
                    const size = isActive ? 104 : 100;
                    return L.icon({
                        iconUrl: ponto.iconUrl,
                        iconSize: [size, size],
                        iconAnchor: [size / 2, size],
                        popupAnchor: [0, -size],
                        className: 'custom-image-icon'
                    });
                } else {
                    const cor = ponto.color || '#2c7da0';
                    return criarIconeNumerado(cor, index + 1, isActive);
                }
            }

            function montarPopup(ponto) {
                // Monta o link do WhatsApp sem o emoji de mensagem
                const whatsappLink = ponto.whatsapp ?
                    `<a href="https://wa.me/55${ponto.phone.replace(/\D/g,'')}" target="_blank" style="color:#25D366;font-weight:600;">${ponto.phone}</a>` :
                    `<span>${ponto.phone}</span>`;

                let emailLine = '';
                if (ponto.email) {
                    emailLine = `<div class="info-line"><span class="emoji">✉️</span> <a href="mailto:${ponto.email}">${ponto.email}</a></div>`;
                }

                return `
                  <div class="popup-header" style="background: ${ponto.color};">
                    <h3>${ponto.icon ? ponto.icon + ' ' : ''}${ponto.title}</h3>
                    <div class="popup-type">${ponto.type}</div>
                  </div>
                  <div class="popup-body">
                    <p>${ponto.description}</p>
                    <div class="info-line"><span class="emoji">📍</span> ${ponto.address}</div>
                    <div class="info-line"><span class="emoji">📞</span> ${whatsappLink}</div>
                    ${emailLine}
                  </div>
                `;
            }

            function abrirPopupEHighlight(index) {
                const ponto = pontosDeInteresse[index];
                const marker = marcadores[index];
                marker.openPopup();
                map.flyTo([ponto.lat, ponto.lng], 16, {
                    duration: 0.8,
                    easeLinearity: 0.25,
                });
                document.querySelectorAll('.point-card').forEach(card => card.classList.remove('active'));
                const cardAtivo = document.querySelector(`.point-card[data-index="${index}"]`);
                if (cardAtivo) {
                    cardAtivo.classList.add('active');
                    cardAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                atualizarIconeMarcador(index, true);
                if (window.innerWidth <= 768) {
                    fecharSidebar();
                }
            }

            function resetarIconeMarcador(index) {
                const marker = marcadores[index];
                marker.setIcon(criarIcone(pontosDeInteresse[index], index, false));
            }

            function atualizarIconeMarcador(index, isActive) {
                const marker = marcadores[index];
                marker.setIcon(criarIcone(pontosDeInteresse[index], index, isActive));
            }

            function resetarTodosIcones() {
                marcadores.forEach((_, i) => resetarIconeMarcador(i));
            }

            // Criar marcadores e adicionar ao mapa
            pontosDeInteresse.forEach((ponto, index) => {
                const icon = criarIcone(ponto, index, false);
                const popupContent = montarPopup(ponto);

                const marker = L.marker([ponto.lat, ponto.lng], {
                    icon: icon,
                    riseOnHover: true,
                    zIndexOffset: 100 - index,
                }).addTo(map);

                marker.bindPopup(popupContent, {
                    maxWidth: 350,
                    minWidth: 260,
                    closeButton: true,
                    autoClose: true,
                    closeOnEscapeKey: true,
                    closeOnClick: true,
                    className: 'popup-custom',
                });

                marker.on('click', function() {
                    resetarTodosIcones();
                    atualizarIconeMarcador(index, true);
                    document.querySelectorAll('.point-card').forEach(card => card.classList.remove('active'));
                    const cardAtivo = document.querySelector(`.point-card[data-index="${index}"]`);
                    if (cardAtivo) cardAtivo.classList.add('active');
                });

                marker.on('popupclose', function() {
                    resetarIconeMarcador(index);
                    document.querySelectorAll('.point-card').forEach(card => card.classList.remove('active'));
                });

                marcadores.push(marker);
            });

            // Cards da sidebar
            pontosDeInteresse.forEach((ponto, index) => {
                const card = document.createElement('div');
                card.className = 'point-card';
                card.setAttribute('data-index', index);
                card.innerHTML = `
                  <div class="marker-num" style="background: ${ponto.color};">${index + 1}</div>
                  <div class="info">
                    <div class="title">${ponto.icon ? ponto.icon + ' ' : ''}${ponto.title}</div>
                    <div class="address">${ponto.address}</div>
                  </div>
                  <span class="arrow-icon">›</span>
                `;
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    resetarTodosIcones();
                    abrirPopupEHighlight(index);
                });
                sidebarList.appendChild(card);
            });

            // Controle da sidebar (mobile)
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const mobileToggle = document.getElementById('mobileToggle');

            function abrirSidebar() {
                sidebar.classList.add('open');
                overlay.classList.add('show');
                mobileToggle.style.display = 'none';
            }

            function fecharSidebar() {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
                if (window.innerWidth <= 768) mobileToggle.style.display = 'flex';
            }

            mobileToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.contains('open') ? fecharSidebar() : abrirSidebar();
            });
            overlay.addEventListener('click', fecharSidebar);
            map.on('click', () => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('open')) fecharSidebar();
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                    mobileToggle.style.display = 'none';
                    map.invalidateSize();
                } else {
                    mobileToggle.style.display = 'flex';
                }
            });

            if (window.innerWidth <= 768) {
                mobileToggle.style.display = 'flex';
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) fecharSidebar();
            });

            // Ajustar mapa aos pontos (com zoom limitado)
            if (pontosDeInteresse.length > 0) {
                const bounds = pontosDeInteresse.map(p => [p.lat, p.lng]);
                map.fitBounds(bounds, {
                    padding: [50, 50],
                    maxZoom: 15,   // evita zoom excessivo no fitBounds
                    animate: true,
                });
            }

            setTimeout(() => map.invalidateSize(), 300);

            console.log('✅ Mapa da rede de saúde mental carregado.');
            console.log('💡 minZoom/maxZoom configurados para evitar sobreposição.');
        })();
    </script>
</body>
</html>
